name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "VERSION=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in scripts
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^# Version: .*/# Version: $VERSION/" normalize-audio || true
          if [[ -f daemon/videonorma-daemon ]]; then
            sed -i "s/^VERSION = \".*\"/VERSION = \"$VERSION\"/" daemon/videonorma-daemon
          fi

      - name: Create release archives
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          tar -czf "videonorma-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --transform "s|^\./|videonorma-${VERSION}/|" \
            .
          zip -r "videonorma-${VERSION}.zip" . -x '.git/*' -x '.github/*'

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "videonorma ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            install.sh
            normalize-audio
            videonorma-${{ steps.version.outputs.VERSION }}.tar.gz
            videonorma-${{ steps.version.outputs.VERSION }}.zip
