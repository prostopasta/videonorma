name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "VERSION=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in scripts
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^VERSION=\".*\"/VERSION=\"$VERSION\"/" normalize-audio || true
          if [[ -f daemon/videonorma-daemon ]]; then
            sed -i "s/^VERSION = \".*\"/VERSION = \"$VERSION\"/" daemon/videonorma-daemon
          fi

      - name: Create source archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Build in /tmp to avoid archiving the output file itself
          tar -czf "/tmp/videonorma-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --transform "s|^\./|videonorma-${VERSION}/|" \
            .
          mv "/tmp/videonorma-${VERSION}.tar.gz" .

      - name: Build .deb package (Ubuntu / Debian)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PKG="videonorma_${VERSION}_all"
          BIN="$PKG/usr/local/bin"
          DOC="$PKG/usr/share/doc/videonorma"
          mkdir -p "$BIN" "$DOC" "$PKG/DEBIAN"

          # ── Install files ──────────────────────────────────────────────────
          install -m755 normalize-audio "$BIN/normalize-audio"
          install -m644 README.md       "$DOC/README.md"
          install -m644 LICENSE         "$DOC/copyright"

          DEPENDS="ffmpeg, libnotify-bin | libnotify4, xdg-utils"

          # Phase 2: daemon + tray icons + systemd unit
          if [[ -f daemon/videonorma-daemon ]]; then
            DEPENDS="$DEPENDS, python3-watchdog, gir1.2-ayatanaappindicator3-0.1, python3-gi"
            mkdir -p "$PKG/usr/share/videonorma" "$PKG/lib/systemd/user"

            install -m755 daemon/videonorma-daemon "$BIN/videonorma-daemon"
            # Patch icon path to system-wide location
            sed -i \
              's|Path.home() / ".local" / "share" / "videonorma"|Path("/usr/share/videonorma")|' \
              "$BIN/videonorma-daemon"

            install -m644 assets/videonorma-dark.svg  "$PKG/usr/share/videonorma/"
            install -m644 assets/videonorma-light.svg "$PKG/usr/share/videonorma/"

            install -m644 daemon/videonorma.service "$PKG/lib/systemd/user/videonorma.service"
            # Patch service ExecStart for system-wide binary path
            sed -i \
              's|%h/.local/bin/videonorma-daemon|/usr/local/bin/videonorma-daemon|' \
              "$PKG/lib/systemd/user/videonorma.service"
          fi

          # ── DEBIAN/control ────────────────────────────────────────────────
          cat > "$PKG/DEBIAN/control" << EOF
          Package: videonorma
          Version: $VERSION
          Architecture: all
          Maintainer: prostopasta <https://github.com/prostopasta/videonorma>
          Depends: $DEPENDS
          Recommends: pipx
          Homepage: https://github.com/prostopasta/videonorma
          Description: Video loudness normalization for Linux
           Normalizes video/audio loudness to EBU R128 (-16 LUFS, broadcast standard).
           Includes CLI tool, file manager right-click script, and (v1.2.0+) background
           daemon with system tray icon for automatic Downloads monitoring.
          EOF

          # ── DEBIAN/postinst ───────────────────────────────────────────────
          # Install ffmpeg-normalize (not available as a .deb; distributed via PyPI)
          cat > "$PKG/DEBIAN/postinst" << 'POSTINST'
          #!/bin/sh
          set -e
          REAL_USER="${SUDO_USER:-}"

          # ── ffmpeg-normalize: pipx check runs INSIDE su to use user's pipx ──
          if [ -n "$REAL_USER" ] && [ "$REAL_USER" != "root" ]; then
              su -l "$REAL_USER" -c '
                  if command -v pipx > /dev/null 2>&1; then
                      pipx install ffmpeg-normalize 2>/dev/null || pipx upgrade ffmpeg-normalize 2>/dev/null || true
                  fi
              ' || true
          fi

          # ── Enable daemon: symlink works without an active user session ──────
          if [ -f /lib/systemd/user/videonorma.service ] && [ -n "$REAL_USER" ] && [ "$REAL_USER" != "root" ]; then
              REAL_HOME=$(getent passwd "$REAL_USER" | cut -d: -f6)
              WANTS_DIR="$REAL_HOME/.config/systemd/user/default.target.wants"
              mkdir -p "$WANTS_DIR"
              ln -sf /lib/systemd/user/videonorma.service "$WANTS_DIR/videonorma.service"

              # Start immediately if the user session bus is reachable
              REAL_UID=$(id -u "$REAL_USER" 2>/dev/null || true)
              if [ -n "$REAL_UID" ] && [ -S "/run/user/$REAL_UID/bus" ]; then
                  su -l "$REAL_USER" -c "
                      export XDG_RUNTIME_DIR=/run/user/$REAL_UID
                      export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$REAL_UID/bus
                      systemctl --user daemon-reload 2>/dev/null || true
                      systemctl --user start videonorma.service 2>/dev/null || true
                  " || true
              fi
          fi
          POSTINST
          chmod 755 "$PKG/DEBIAN/postinst"

          # ── Build ─────────────────────────────────────────────────────────
          # dpkg-deb names output <PKG_DIR>.deb → already videonorma_${VERSION}_all.deb
          dpkg-deb --build --root-owner-group "$PKG"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "videonorma ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            videonorma_${{ steps.version.outputs.VERSION }}_all.deb
            videonorma-${{ steps.version.outputs.VERSION }}.tar.gz
