name: Release

# Triggers:
#   1. Push to main — auto-detects bump from conventional commits, creates tag + release
#   2. Tag push (v*.*.*) — manual release from a pushed tag (e.g. hotfix)
on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Determine version ───────────────────────────────────────────
      # On tag push → use the tag directly.
      # On branch push → read conventional commits since last tag, bump semver.
      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "new_tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Source: manual tag $REF_NAME"
            exit 0
          fi

          # Branch push — determine bump from commits
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [[ -z "$LATEST" ]] && LATEST="v0.0.0"
          echo "Latest tag: $LATEST"

          COMMITS=$(git log "${LATEST}..HEAD" --format="%s%n%b" 2>/dev/null || true)
          if [[ -z "$COMMITS" ]]; then
            echo "No new commits — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?!?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?!?:"; then
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"
          if [[ "$BUMP" == "none" ]]; then
            echo "No releasable commits (no fix/feat) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VER="${LATEST#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_TAG"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG"   >> "$GITHUB_OUTPUT"
          echo "skip=false"         >> "$GITHUB_OUTPUT"

      # ── Step 2: Tag commit (branch push only) ──────────────────────────────
      - name: Create and push tag
        if: steps.version.outputs.skip == 'false' && github.ref_type == 'branch'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      # ── Step 3: Build artifacts ─────────────────────────────────────────────
      - name: Skip check
        if: steps.version.outputs.skip == 'true'
        run: echo "Nothing to release." && exit 0

      - name: Update version in scripts
        if: steps.version.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^VERSION=\".*\"/VERSION=\"$VERSION\"/" normalize-audio || true
          if [[ -f daemon/videonorma-daemon ]]; then
            sed -i "s/^VERSION = \".*\"/VERSION = \"$VERSION\"/" daemon/videonorma-daemon
          fi

      - name: Create source archive
        if: steps.version.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tar -czf "/tmp/videonorma-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --transform "s|^\./|videonorma-${VERSION}/|" \
            .
          mv "/tmp/videonorma-${VERSION}.tar.gz" .

      - name: Build .deb package (Ubuntu / Debian)
        if: steps.version.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG="videonorma_${VERSION}_all"
          BIN="$PKG/usr/local/bin"
          DOC="$PKG/usr/share/doc/videonorma"
          mkdir -p "$BIN" "$DOC" "$PKG/DEBIAN"

          # ── Install files ──────────────────────────────────────────────────
          install -m755 normalize-audio "$BIN/normalize-audio"
          install -m644 README.md       "$DOC/README.md"
          install -m644 LICENSE         "$DOC/copyright"

          DEPENDS="ffmpeg, libnotify-bin | libnotify4, xdg-utils"

          # Phase 2: daemon + tray icons + systemd unit
          if [[ -f daemon/videonorma-daemon ]]; then
            DEPENDS="$DEPENDS, python3-watchdog, gir1.2-ayatanaappindicator3-0.1, python3-gi"
            mkdir -p "$PKG/usr/share/icons/hicolor/scalable/apps" "$PKG/lib/systemd/user"

            install -m755 daemon/videonorma-daemon "$BIN/videonorma-daemon"

            # Icons go to standard XDG icon theme path so GTK finds them by name
            install -m644 assets/videonorma-dark.svg  "$PKG/usr/share/icons/hicolor/scalable/apps/"
            install -m644 assets/videonorma-light.svg "$PKG/usr/share/icons/hicolor/scalable/apps/"

            install -m644 daemon/videonorma.service "$PKG/lib/systemd/user/videonorma.service"
            # Patch service ExecStart for system-wide binary path
            sed -i \
              's|%h/.local/bin/videonorma-daemon|/usr/local/bin/videonorma-daemon|' \
              "$PKG/lib/systemd/user/videonorma.service"
          fi

          # ── DEBIAN/control ────────────────────────────────────────────────
          cat > "$PKG/DEBIAN/control" << EOF
          Package: videonorma
          Version: $VERSION
          Architecture: all
          Maintainer: prostopasta <https://github.com/prostopasta/videonorma>
          Depends: $DEPENDS
          Recommends: pipx
          Homepage: https://github.com/prostopasta/videonorma
          Description: Video loudness normalization for Linux
           Normalizes video/audio loudness to EBU R128 (-16 LUFS, broadcast standard).
           Includes CLI tool, file manager right-click script, and background
           daemon with system tray icon for automatic Downloads monitoring.
          EOF

          # ── DEBIAN/postinst ───────────────────────────────────────────────
          cat > "$PKG/DEBIAN/postinst" << 'POSTINST'
          #!/bin/sh
          set -e

          # dpkg does not always forward SUDO_USER — use multiple fallbacks
          REAL_USER="${SUDO_USER:-}"
          if [ -z "$REAL_USER" ] || [ "$REAL_USER" = "root" ]; then
              REAL_USER=$(logname 2>/dev/null || true)
          fi
          if [ -z "$REAL_USER" ] || [ "$REAL_USER" = "root" ]; then
              REAL_USER=$(who | awk 'NR==1 && $1!="root"{print $1}')
          fi

          # ── ffmpeg-normalize: pipx check runs INSIDE su to use user's pipx ──
          if [ -n "$REAL_USER" ] && [ "$REAL_USER" != "root" ]; then
              su -l "$REAL_USER" -c '
                  if command -v pipx > /dev/null 2>&1; then
                      pipx install ffmpeg-normalize 2>/dev/null || pipx upgrade ffmpeg-normalize 2>/dev/null || true
                  fi
              ' || true
          fi

          # ── Enable daemon ─────────────────────────────────────────────────────
          if [ -f /lib/systemd/user/videonorma.service ] && [ -n "$REAL_USER" ] && [ "$REAL_USER" != "root" ]; then
              REAL_HOME=$(getent passwd "$REAL_USER" | cut -d: -f6)

              # Remove old binaries installed by install.sh so /usr/local/bin/ takes effect
              for OLD_BIN in normalize-audio videonorma-daemon; do
                  OLD_PATH="$REAL_HOME/.local/bin/$OLD_BIN"
                  if [ -f "$OLD_PATH" ] && [ ! -L "$OLD_PATH" ]; then
                      rm -f "$OLD_PATH"
                  fi
              done

              # Remove old user-installed service file (from install.sh) so systemd
              # uses the system-wide unit at /lib/systemd/user/ instead
              OLD_SVC="$REAL_HOME/.config/systemd/user/videonorma.service"
              if [ -f "$OLD_SVC" ] && [ ! -L "$OLD_SVC" ]; then
                  rm -f "$OLD_SVC"
              fi

              # Enable via wants symlink — works without an active user session
              WANTS_DIR="$REAL_HOME/.config/systemd/user/default.target.wants"
              mkdir -p "$WANTS_DIR"
              ln -sf /lib/systemd/user/videonorma.service "$WANTS_DIR/videonorma.service"

              # Start immediately if the user session bus is reachable
              REAL_UID=$(id -u "$REAL_USER" 2>/dev/null || true)
              if [ -n "$REAL_UID" ] && [ -S "/run/user/$REAL_UID/bus" ]; then
                  su -l "$REAL_USER" -c "
                      export XDG_RUNTIME_DIR=/run/user/$REAL_UID
                      export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$REAL_UID/bus
                      systemctl --user daemon-reload 2>/dev/null || true
                      systemctl --user start videonorma.service 2>/dev/null || true
                  " || true
              fi
          fi
          POSTINST
          chmod 755 "$PKG/DEBIAN/postinst"

          # ── Build ─────────────────────────────────────────────────────────
          dpkg-deb --build --root-owner-group "$PKG"

      - name: Publish release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: "videonorma ${{ steps.version.outputs.new_tag }}"
          generate_release_notes: true
          files: |
            videonorma_${{ steps.version.outputs.version }}_all.deb
            videonorma-${{ steps.version.outputs.version }}.tar.gz
