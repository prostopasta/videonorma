name: Auto Tag

# Runs on every push to main.
# Reads commits since the last semver tag, decides bump type by
# conventional-commit prefix, then pushes a new tag — which triggers release.yml.
#
# Rules:
#   fix(...)  → patch   1.2.2 → 1.2.3
#   feat(...) → minor   1.2.x → 1.3.0
#   BREAKING CHANGE in body → major   1.x → 2.0.0
#   No fix/feat commits → no tag, no release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    name: Bump version and tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump and push tag
        id: bump
        run: |
          # ── Latest semver tag ────────────────────────────────────────────
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [[ -z "$LATEST" ]]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          # ── Collect commits since last tag ───────────────────────────────
          COMMITS=$(git log "${LATEST}..HEAD" --format="%s%n%b" 2>/dev/null || git log --format="%s%n%b")
          if [[ -z "$COMMITS" ]]; then
            echo "No new commits since $LATEST — skipping."
            exit 0
          fi

          # ── Decide bump type ─────────────────────────────────────────────
          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?!?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?!?:"; then
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"

          if [[ "$BUMP" == "none" ]]; then
            echo "No releasable commits (no fix/feat) — skipping."
            exit 0
          fi

          # ── Compute new version ──────────────────────────────────────────
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"

          # ── Push tag (triggers release.yml) ─────────────────────────────
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Pushed $NEW_TAG — release workflow will start."
