<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#2d3561" stroke-width="1.5"/>

  <!-- Film frame corners (top-left) -->
  <rect x="10" y="10" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <rect x="10" y="20" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <!-- Film frame corners (top-right) -->
  <rect x="102" y="10" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <rect x="102" y="20" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <!-- Film frame corners (bottom-left) -->
  <rect x="10" y="92" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <rect x="10" y="82" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <!-- Film frame corners (bottom-right) -->
  <rect x="102" y="92" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>
  <rect x="102" y="82" width="8" height="8" rx="1" fill="#4ecca3" opacity="0.6"/>

  <!-- "Before" waveform (uneven, chaotic) — muted purple -->
  <g opacity="0.45">
    <rect x="22" y="52" width="5" height="16" rx="2" fill="url(#wave2)"/>
    <rect x="29" y="42" width="5" height="36" rx="2" fill="url(#wave2)"/>
    <rect x="36" y="56" width="5" height="8"  rx="2" fill="url(#wave2)"/>
    <rect x="43" y="38" width="5" height="44" rx="2" fill="url(#wave2)"/>
    <rect x="50" y="50" width="5" height="20" rx="2" fill="url(#wave2)"/>
  </g>

  <!-- Arrow "→" -->
  <text x="60" y="65" font-size="13" fill="#ffffff" opacity="0.7"
        font-family="monospace" text-anchor="middle">→</text>

  <!-- "After" waveform (normalized, even) — bright teal -->
  <rect x="68" y="50" width="5" height="20" rx="2" fill="url(#wave)"/>
  <rect x="75" y="50" width="5" height="20" rx="2" fill="url(#wave)"/>
  <rect x="82" y="50" width="5" height="20" rx="2" fill="url(#wave)"/>
  <rect x="89" y="50" width="5" height="20" rx="2" fill="url(#wave)"/>
  <rect x="96" y="50" width="5" height="20" rx="2" fill="url(#wave)"/>

  <!-- Label -->
  <text x="60" y="108" font-size="9" fill="#4ecca3" font-family="monospace"
        text-anchor="middle" letter-spacing="2">videonorma</text>
</svg>
