<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- White waveform icon for dark panels/trays -->
  <!-- "before" bars (uneven height, faded white) -->
  <rect x="0"   y="8"   width="3" height="6"  rx="1" fill="white" opacity="0.45"/>
  <rect x="4"   y="4"   width="3" height="14" rx="1" fill="white" opacity="0.45"/>
  <rect x="8"   y="9"   width="3" height="4"  rx="1" fill="white" opacity="0.45"/>

  <!-- arrow (right-pointing triangle) -->
  <polygon points="12,8.5 12,13.5 14.5,11" fill="white" opacity="0.7"/>

  <!-- "after" bars (equal height, solid white) -->
  <rect x="15.5" y="6.5" width="3" height="9" rx="1" fill="white"/>
  <rect x="19.5" y="6.5" width="2.5" height="9" rx="1" fill="white"/>
</svg>
