<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- White waveform icon for dark panels/trays -->
  <!-- "before" bars (shorter, faded) -->
  <rect x="1"  y="8"  width="2.5" height="6"  rx="1" fill="white" opacity="0.45"/>
  <rect x="4.5" y="5" width="2.5" height="12" rx="1" fill="white" opacity="0.45"/>
  <rect x="8"  y="9"  width="2.5" height="4"  rx="1" fill="white" opacity="0.45"/>

  <!-- arrow -->
  <text x="11" y="13" font-size="5" fill="white" opacity="0.7"
        font-family="sans-serif" font-weight="bold">›</text>

  <!-- "after" bars (equal height, bright) -->
  <rect x="13.5" y="7" width="2.5" height="8" rx="1" fill="white"/>
  <rect x="17"   y="7" width="2.5" height="8" rx="1" fill="white"/>
</svg>
